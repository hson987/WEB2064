<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Quản lý danh mục</title>
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/categories.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="logo">
                <i class="fas fa-mug-hot"></i>
                <h1>Admin - Susan Coffee & Tea</h1>
            </div>

            <nav>
                <a href="index.html">
                    <i class="fas fa-home"></i>
                    <span>Trang chủ</span>
                </a>
                <a href="products.html">
                    <i class="fas fa-box"></i>
                    <span>Sản phẩm</span>
                </a>
                <a href="categories.html">
                    <i class="fas fa-tags"></i>
                    <span>Danh mục</span>
                </a>
                <a href="orders.html">
                    <i class="fas fa-receipt"></i>
                    <span>Đơn hàng</span>
                </a>
                <a href="customers.html">
                    <i class="fas fa-user-friends"></i>
                    <span>Khách hàng</span>
                </a>
                <a href="users.html">
                    <i class="fas fa-user-shield"></i>
                    <span>Nhân viên</span>
                </a>
                <a href="login.html" id="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Đăng xuất</span>
                </a>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1>☕ Quản lý danh mục sản phẩm</h1>

        <!-- FORM -->
        <form id="category-form" class="form-box">
            <input type="hidden" id="id">
            
            <input type="text" id="name" placeholder="Nhập tên danh mục..." required>
            <button type="submit" id="save-btn">💾 Lưu</button>
        </form>

        <!-- BẢNG -->
        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tên danh mục</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="category-list"></tbody>
            </table>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Susan Coffee & Tea - Trang quản trị</p>
            <p class="made-with-love">
                Made with <i class="fas fa-heart" style="color:#e74c3c"></i> & 
                <i class="fas fa-coffee" style="color:#8B4513"></i>
            </p>
            <a href="../users/index.html">Về trang người dùng</a>
        </div>
    </footer>

    <script src="js/categories.js"></script>
</body>
</html>
